name: 사이트 오류 및 개선 제안
description: 페이지 내용, 링크, 진단 기능의 오류나 개선 의견을 남겨 주세요.
title: "[사이트 문의] "
body:
  - type: markdown
    attributes:
      value: |
        공개 게시판입니다. 이메일, Windows 제품 키, 장치 일련번호, 사용자 이름 등 개인정보를 적지 마세요.
  - type: input
    id: page
    attributes:
      label: 문제가 발생한 페이지
      description: 페이지 주소 또는 제목을 입력해 주세요.
      placeholder: https://itsvc.co.kr/diagnostic.html
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: 문의 유형
      options:
        - 내용 수정
        - 링크 또는 화면 오류
        - 진단 기능 오류
        - 새로운 가이드 제안
        - 기타
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 확인한 내용과 재현 순서
      description: 어떤 화면에서 무엇을 눌렀고 어떤 결과가 표시됐는지 적어 주세요.
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: 개인정보 확인
      options:
        - label: 공개되면 안 되는 개인정보와 제품 키를 포함하지 않았습니다.
          required: true
