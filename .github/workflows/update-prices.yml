name: Update Prices

on:
  schedule:
    - cron: '0 1 * * 1-5'  # 평일 10:00 KST (= 01:00 UTC, Mon-Fri)
  push:
    paths:
      - 'fetch-prices.js'   # 가격 쿼리 변경 시 자동 실행
      - 'data.js'           # 신규 부품 추가 시 자동 실행
  workflow_dispatch:         # 수동 실행 허용

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch prices from Naver Shopping
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: node fetch-prices.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add prices.json
          git diff --cached --quiet || git commit -m "chore: update motherboard prices [skip ci]"
          git push
