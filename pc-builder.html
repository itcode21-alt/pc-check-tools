  <style>
    /* ── Step progress ── */
    .builder-steps {
      display: flex;
      margin: 1.5rem 0 1rem;
      overflow-x: auto;
      border-bottom: 2px solid var(--line);
    }
    .builder-step {
      flex: 1;
      min-width: 72px;
      padding: .5rem .4rem .6rem;
      text-align: center;
      cursor: pointer;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      color: var(--text-secondary);
      transition: color .15s, border-color .15s;
    }
    .builder-step:hover { color: var(--accent-link); }
    .builder-step.active { border-color: var(--accent-link); color: var(--accent-link); }
    .builder-step.done  { border-color: #16a34a; color: #16a34a; }
    .step-num { font-size: .62rem; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; }
    .step-label { font-size: .78rem; margin-top: .15rem; }

    /* ── Layout ── */
    .builder-body {
      display: grid;
      grid-template-columns: 1fr 260px;
      gap: 1.5rem;
      align-items: start;
    }
    @media (max-width: 700px) { .builder-body { grid-template-columns: 1fr; } }

    /* ── Parts grid ── */
    .parts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: .85rem;
    }

    /* ── Part card ── */
    .part-card {
      background: var(--panel);
      border: 2px solid var(--line);
      border-radius: 10px;
      padding: .9rem;
      cursor: pointer;
      transition: border-color .15s, box-shadow .15s;
      display: flex;
      flex-direction: column;
    }
    .part-card:hover:not(.incompatible) { border-color: var(--accent-link); box-shadow: var(--shadow-sm); }
    .part-card.selected { border-color: var(--accent-link); background: color-mix(in srgb, var(--accent-link) 7%, var(--panel)); }
    .part-card.incompatible { opacity: .55; cursor: not-allowed; border-color: #fca5a5; }
    .part-name { font-weight: 700; font-size: .88rem; margin-bottom: .3rem; }
    .part-specs { font-size: .72rem; color: var(--text-secondary); margin-bottom: .6rem; line-height: 1.5; }
    .bench-label { font-size: .62rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
    .bench-score { font-size: .82rem; font-weight: 700; color: var(--accent-link); margin: .1rem 0 .25rem; }
    .bench-track { height: 4px; background: var(--line); border-radius: 2px; overflow: hidden; }
    .bench-fill  { height: 100%; border-radius: 2px; background: var(--accent-link); }
    .part-price  { font-size: .78rem; font-weight: 700; color: var(--accent-link); margin-top: .4rem; }
    .incompat-msg { font-size: .68rem; color: #dc2626; margin-top: .5rem; }
    .selected-badge { font-size: .7rem; font-weight: 700; color: var(--accent-link); margin-top: .55rem; }

    /* ── Compat alert ── */
    .compat-alert { display: none; border-radius: 8px; padding: .65rem 1rem; margin-bottom: .9rem; font-size: .84rem; }
    .compat-alert.warn { display: block; background: #fefce8; border: 1px solid #fbbf24; color: #713f12; }
    .compat-alert.error { display: block; background: #fef2f2; border: 1px solid #f87171; color: #991b1b; }

    /* ── PSU rec ── */
    .psu-rec { background: var(--bg-soft); border: 1px solid var(--line); border-radius: 8px; padding: .7rem 1rem; margin-bottom: .9rem; font-size: .83rem; }
    .psu-rec strong { font-size: 1.15rem; color: var(--accent-link); }

    /* ── Step actions ── */
    .step-actions { display: flex; gap: .6rem; margin-top: 1.2rem; flex-wrap: wrap; }

    /* ── Build panel ── */
    .build-panel { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 1rem; position: sticky; top: 5rem; }
    .build-panel h3 { font-size: .88rem; margin-bottom: .7rem; }
    .build-row { display: flex; justify-content: space-between; gap: .5rem; padding: .38rem 0; border-bottom: 1px solid var(--line); font-size: .77rem; }
    .build-row:last-child { border: none; }
    .build-cat  { color: var(--text-secondary); white-space: nowrap; }
    .build-val  { font-weight: 600; text-align: right; }
    .build-tdp  { margin-top: .65rem; padding-top: .65rem; border-top: 1px solid var(--line); }
    .tdp-num    { font-size: 1.1rem; font-weight: 700; color: var(--accent-link); }
    .build-total { margin-top: .5rem; padding-top: .5rem; border-top: 1px solid var(--line); }
    .total-num   { font-size: 1.05rem; font-weight: 700; color: var(--accent-link); }

    /* ── Sort bar ── */
    .sort-bar { display: flex; align-items: center; gap: .4rem; margin-bottom: .85rem; flex-wrap: wrap; }
    .sort-bar-label { font-size: .7rem; color: var(--muted); white-space: nowrap; margin-right: .2rem; }
    .sort-btn { padding: .26rem .65rem; border-radius: 20px; border: 1px solid var(--line); background: none; font-size: .72rem; cursor: pointer; color: var(--text-secondary); transition: border-color .12s, color .12s, background .12s; }
    .sort-btn:hover { border-color: var(--accent-link); color: var(--accent-link); }
    .sort-btn.active { border-color: var(--accent-link); background: var(--accent-link); color: #fff; font-weight: 600; }

    /* ── Value badges ── */
    .value-badge { display: inline-flex; align-items: center; gap: .2rem; font-size: .62rem; font-weight: 700; padding: .15rem .45rem; border-radius: 10px; margin-top: .35rem; }
    .value-1 { background: #fef3c7; color: #92400e; }
    .value-2 { background: #e2e8f0; color: #475569; }
    .value-3 { background: #ffedd5; color: #9a3412; }

    /* ── Final summary ── */
    .final-card { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 1.25rem; }
    .final-row  { display: flex; align-items: flex-start; gap: .9rem; padding: .65rem 0; border-bottom: 1px solid var(--line); }
    .final-row:last-child { border: none; }
    .final-icon { font-size: 1.15rem; width: 1.6rem; flex-shrink: 0; text-align: center; margin-top: .1rem; }
    .final-info { flex: 1; }
    .final-name { font-weight: 600; font-size: .88rem; }
    .final-spec { font-size: .72rem; color: var(--text-secondary); margin-top: .1rem; }
    .compat-ok  { font-size: .72rem; font-weight: 700; color: #16a34a; white-space: nowrap; }
    .compat-err { font-size: .72rem; font-weight: 700; color: #dc2626; white-space: nowrap; }
    .final-total { background: var(--bg-soft); border-radius: 8px; padding: .75rem 1rem; margin-top: .5rem; display: flex; gap: .9rem; align-items: center; }
    .case-guide { border: 1.5px dashed var(--line); border-radius: 10px; padding: 1rem 1.1rem; margin-top: 1rem; }
    .case-guide-title { font-size: .78rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--text-secondary); margin-bottom: .6rem; }
    .case-check { display: flex; align-items: flex-start; gap: .65rem; padding: .45rem 0; border-bottom: 1px solid var(--line); }
    .case-check:last-child { border: none; padding-bottom: 0; }
    .case-check-icon { font-size: 1rem; width: 1.4rem; flex-shrink: 0; text-align: center; margin-top: .05rem; }
    .case-check-body { flex: 1; font-size: .8rem; line-height: 1.5; }
    .case-check-body strong { font-weight: 600; }
    .case-check-body .hint { font-size: .72rem; color: var(--muted); margin-top: .15rem; }

/* ── Steps definition ── */
const STEPS = [
  { key: 'cpu', label: 'CPU',    icon: '⚙️', cat: 'cpus',         desc: 'PC의 두뇌. 코어 수·소켓·TDP를 확인하세요.' },
  { key: 'mb',  label: '메인보드', icon: '🧩', cat: 'motherboards', desc: 'CPU 소켓이 일치하는 보드가 자동으로 표시됩니다.' },
  { key: 'ram', label: 'RAM',    icon: '💡', cat: 'rams',          desc: 'DDR5 속도와 용량을 확인하세요.' },
  { key: 'gpu', label: 'GPU',    icon: '🎨', cat: 'gpus',          desc: 'VRAM·TDP·인터페이스를 확인하세요.' },
  { key: 'ssd', label: 'SSD',    icon: '🗄️', cat: 'ssds',          desc: 'NVMe PCIe 4.0 이상을 권장합니다.' },
  { key: 'psu', label: '파워',   icon: '🔋', cat: 'psus',          desc: '선택된 CPU+GPU TDP 기준 권장 용량 이상만 표시됩니다.' },
];

const ICONS = { cpu:'🖥️', mb:'🔌', ram:'💾', gpu:'🎮', ssd:'💿', psu:'⚡' };
const LABELS = { cpu:'CPU', mb:'메인보드', ram:'RAM', gpu:'GPU', ssd:'SSD', psu:'파워' };

/* ── State ── */
let curStep = 0;
let curSort = null;
const sel = {};  // { cpu: partObj, mb: partObj, ... }

const checker = new HardwareCompatibility(window.SITE_DATA);

/* ── Helpers ── */
function getSpecs(cat, p) {
  if (cat === 'cpus')         return `${p.cores}코어 · ${p.socket} · TDP ${p.tdp}W`;
  if (cat === 'motherboards') return `소켓 ${p.socket}`;
  if (cat === 'gpus')         return `VRAM ${p.memory}GB · TDP ${p.tdp}W · ${p.interface}`;
  if (cat === 'rams')         return `${p.type}-${p.speed}${p.cas != null ? ` · CL${p.cas}` : ''} · ${Math.max(...(p.capacity||[32]))}GB`;
  if (cat === 'ssds')         return `${p.type} · ${p.interface} · ${p.formFactor}`;
  if (cat === 'psus')         return `${p.wattage}W`;
  return '';
}

function getBench(cat, p) {
  if (cat === 'cpus')  return BENCH.cpus[p.id]  || null;
  if (cat === 'gpus')  return BENCH.gpus[p.id]  || null;
  if (cat === 'rams')  return { score: p.speed,        label: 'DDR 속도 (MT/s)' };
  if (cat === 'ssds')  return p.speed ? { score: p.speed.read, label: '순차 읽기 (MB/s)' } : null;
  if (cat === 'psus')  return { score: p.wattage,      label: '용량 (W)' };
  if (cat === 'motherboards') return p.price ? { score: p.price, label: p._livePrice ? '최저가 (원) · 네이버' : '가격 (원)' } : null;
  return null;
}

function maxBench(cat) {
  return checker.getAllParts(cat).reduce((m, p) => {
    const b = getBench(cat, p);
    return b && b.score > m ? b.score : m;
  }, 1);
}

function totalTdp() {
  return (sel.cpu?.tdp || 0) + (sel.gpu?.tdp || 0);
}

function getIssues(cat, part) {
  const issues = [];
  const run = (fn, ...args) => {
    try { const r = fn(...args); if (r && !r.compatible) issues.push(...(r.issues||['호환되지 않습니다.'])); }
    catch(e) {}
  };
  if (cat==='motherboards' && sel.cpu) run(checker.checkCpuMotherboard.bind(checker), sel.cpu.id, part.id);
  if (cat==='cpus'         && sel.mb)  run(checker.checkCpuMotherboard.bind(checker), part.id, sel.mb.id);
  if (cat==='rams'         && sel.mb)  run(checker.checkRamMotherboard.bind(checker),  part.id, sel.mb.id);
  if (cat==='gpus'         && sel.psu) run(checker.checkGpuPsu.bind(checker),          part.id, sel.psu.id);
  if (cat==='psus'         && sel.gpu) run(checker.checkGpuPsu.bind(checker),          sel.gpu.id, part.id);
  if (cat==='ssds'         && sel.mb)  run(checker.checkSsdMotherboard.bind(checker),  part.id, sel.mb.id);
  return issues;
}

function filteredParts(step) {
  let parts = checker.getAllParts(step.cat);
  if (step.cat === 'motherboards' && sel.cpu) {
    const f = parts.filter(p => p.socket === sel.cpu.socket);
    if (f.length) parts = f;
  }
  if (step.cat === 'psus') {
    const minW = Math.ceil(totalTdp() * 1.3);
    const f = parts.filter(p => p.wattage >= minW);
    if (f.length) parts = f;
  }
  const sort = curSort || (step.cat === 'motherboards' ? 'price-asc' : 'perf-desc');
  return [...parts].sort((a, b) => {
    if (sort === 'price-asc' || sort === 'price-desc') {
      const asc = sort === 'price-asc';
      const getP = p => p._livePrice || (step.cat === 'motherboards' ? p.price : 0) || (asc ? Infinity : -1);
      return asc ? getP(a) - getP(b) : getP(b) - getP(a);
    }
    const asc = sort === 'perf-asc';
    const sa = getBench(step.cat, a)?.score ?? (asc ? Infinity : -1);
    const sb = getBench(step.cat, b)?.score ?? (asc ? Infinity : -1);
    return asc ? sa - sb : sb - sa;
  });
}

function setSort(s) {
  curSort = s;
  renderGrid();
}

function valueBadges(cat, parts) {
  if (cat === 'motherboards') return {};
  const scored = [];
  for (const p of parts) {
    const b = getBench(cat, p);
    if (b && b.score > 0 && p._livePrice > 0) {
      scored.push({ id: p.id, v: b.score / (p._livePrice / 10000) });
    }
  }
  scored.sort((a, b) => b.v - a.v);
  const result = {};
  scored.slice(0, 3).forEach((x, i) => { result[x.id] = i + 1; });
  return result;
}

/* ── Render ── */
function render() {
  renderTabs();
  renderGrid();
  renderPanel();
  renderButtons();
}

function renderTabs() {
  document.getElementById('builder-steps').innerHTML = STEPS.map((s, i) =>
    `<button class="builder-step${i===curStep?' active':''}${sel[s.key]?' done':''}"
      onclick="goStep(${i})">
      <div class="step-num">${i+1}</div>
      <div class="step-label">${sel[s.key]?'✓ ':''}${s.label}</div>
    </button>`
  ).join('');
}

function renderGrid() {
  const step = STEPS[curStep];
  const parts = filteredParts(step);
  const mx = maxBench(step.cat);
  const vbadge = valueBadges(step.cat, parts);
  const activeSort = curSort || (step.cat === 'motherboards' ? 'price-asc' : 'perf-desc');

  document.getElementById('step-heading').textContent = `${step.icon} ${step.label} 선택`;
  document.getElementById('step-desc').textContent = step.desc;
  const liveNote = document.getElementById('live-price-note');
  if (step.cat === 'motherboards' && livePricesUpdated) {
    liveNote.textContent = '📡 네이버 쇼핑 최저가 기준 · ' + livePricesUpdated;
    liveNote.hidden = false;
  } else {
    liveNote.hidden = true;
  }

  // PSU recommendation slot
  const slot = document.getElementById('psu-rec-slot');
  if (step.cat === 'psus') {
    const tdp = totalTdp();
    const minW = Math.ceil(tdp * 1.3);
    slot.innerHTML = `<div class="psu-rec">선택된 부품 총 TDP: <strong>${tdp}W</strong> → 권장 최소 파워: <strong>${minW}W</strong> 이상</div>`;
  } else {
    slot.innerHTML = '';
  }

  // Sort bar
  const sortButtons = step.cat === 'motherboards'
    ? [['price-asc','가격 낮은순'],['price-desc','가격 높은순']]
    : [['perf-desc','성능 높은순'],['perf-asc','성능 낮은순'],
       ...(livePricesUpdated ? [['price-asc','가격 낮은순'],['price-desc','가격 높은순']] : [])];
  document.getElementById('sort-bar').innerHTML =
    '<span class="sort-bar-label">정렬</span>'
    + sortButtons.map(([s, label]) =>
        `<button class="sort-btn${activeSort===s?' active':''}" onclick="setSort('${s}')">${label}</button>`
      ).join('');

  document.getElementById('parts-grid').innerHTML = parts.map(p => {
    const b = getBench(step.cat, p);
    const isSelected = sel[step.key]?.id === p.id;
    const issues = getIssues(step.cat, p);
    const incompat = issues.length > 0;
    const pct = b ? Math.round(b.score / mx * 100) : 0;
    const benchHtml = b
      ? '<div class="bench-label">' + b.label + '</div>'
        + '<div class="bench-score">' + b.score.toLocaleString() + '</div>'
        + '<div class="bench-track"><div class="bench-fill" style="width:' + pct + '%"></div></div>'
      : '';
    const priceHtml = (p._livePrice && step.cat !== 'motherboards')
      ? '<div class="part-price">₩' + p._livePrice.toLocaleString() + '</div>'
      : '';
    const rank = vbadge[p.id];
    const rankHtml = rank
      ? `<div class="value-badge value-${rank}">${['🥇','🥈','🥉'][rank-1]} 가성비 ${rank}위</div>`
      : '';
    return '<div class="part-card'
      + (isSelected ? ' selected' : '') + (incompat ? ' incompatible' : '') + '"'
      + ' data-key="' + step.key + '" data-id="' + p.id + '"'
      + (incompat ? ' title="' + issues.join(' ') + '"' : '') + '>'
      + '<div class="part-name">' + p.manufacturer + ' ' + (p.model || p.series) + '</div>'
      + '<div class="part-specs">' + getSpecs(step.cat, p) + '</div>'
      + benchHtml
      + priceHtml
      + rankHtml
      + (incompat ? '<div class="incompat-msg">⚠ ' + issues[0] + '</div>' : '')
      + (isSelected ? '<div class="selected-badge">✓ 선택됨</div>' : '')
      + '</div>';
  }).join('');
}

function totalPrice() {
  return Object.values(sel).reduce((sum, p) => sum + (p?._livePrice || 0), 0);
}

function renderPanel() {
  document.getElementById('build-rows').innerHTML = STEPS.map(s =>
    `<div class="build-row">
      <span class="build-cat">${ICONS[s.key]} ${LABELS[s.key]}</span>
      <span class="build-val">${sel[s.key] ? `${sel[s.key].manufacturer} ${sel[s.key].model||sel[s.key].series}` : '—'}</span>
    </div>`
  ).join('');
  document.getElementById('tdp-num').textContent = totalTdp() + 'W';
  const tp = totalPrice();
  document.getElementById('total-price-num').textContent = tp > 0 ? '₩' + tp.toLocaleString() : '—';
  document.getElementById('price-source').textContent = tp > 0 && livePricesUpdated ? '· 네이버' : '';
}

function renderButtons() {
  const isLast = curStep === STEPS.length - 1;
  const hasSel = !!sel[STEPS[curStep].key];
  document.getElementById('prev-btn').hidden = curStep === 0;
  document.getElementById('next-btn').hidden = !hasSel || isLast;
  document.getElementById('skip-btn').textContent = isLast ? '파워 없이 완성' : '이 단계 건너뛰기';
  document.getElementById('finish-btn').hidden = !(hasSel && isLast);
}

/* ── Select a part ── */
function selectPart(key, id) {
  const step = STEPS.find(s => s.key === key);
  const part = checker.getAllParts(step.cat).find(p => p.id === id);
  sel[key] = part;

  const issues = getIssues(step.cat, part);
  const alert = document.getElementById('compat-alert');
  if (issues.length) {
    alert.className = 'compat-alert error';
    alert.textContent = '⚠ 호환 경고: ' + issues.join(' | ');
  } else {
    alert.className = 'compat-alert';
  }
  render();
}

/* ── Navigation ── */
function goStep(n) {
  curStep = Math.max(0, Math.min(STEPS.length - 1, n));
  curSort = null;
  document.getElementById('compat-alert').className = 'compat-alert';
  render();
}

document.getElementById('prev-btn').addEventListener('click',   () => goStep(curStep - 1));
document.getElementById('next-btn').addEventListener('click',   () => goStep(curStep + 1));
document.getElementById('skip-btn').addEventListener('click',   () => curStep === STEPS.length-1 ? showFinal() : goStep(curStep + 1));
document.getElementById('finish-btn').addEventListener('click', showFinal);

/* ── Final summary ── */
function showFinal() {
  document.getElementById('builder-body').hidden = true;
  document.getElementById('builder-steps').hidden = true;
  document.getElementById('compat-alert').className = 'compat-alert';

  const tryCheck = (fn, ...args) => {
    try { return fn(...args); } catch(e) { return null; }
  };
  const compatMap = {
    mb:  sel.cpu && sel.mb  ? tryCheck(checker.checkCpuMotherboard.bind(checker), sel.cpu.id, sel.mb.id)  : null,
    ram: sel.mb  && sel.ram ? tryCheck(checker.checkRamMotherboard.bind(checker),  sel.ram.id, sel.mb.id)  : null,
    gpu: sel.gpu && sel.psu ? tryCheck(checker.checkGpuPsu.bind(checker),          sel.gpu.id, sel.psu.id) : null,
    ssd: sel.ssd && sel.mb  ? tryCheck(checker.checkSsdMotherboard.bind(checker),  sel.ssd.id, sel.mb.id)  : null,
  };

  const rows = STEPS.map(s => {
    const p = sel[s.key];
    const cr = compatMap[s.key];
    const compatHtml = cr
      ? cr.compatible
        ? `<span class="compat-ok">✓ 호환</span>`
        : `<span class="compat-err">✗ ${(cr.issues||['비호환'])[0]}</span>`
      : '';
    return `
      <div class="final-row">
        <div class="final-icon">${s.icon}</div>
        <div class="final-info">
          <div class="final-name">${p ? `${p.manufacturer} ${p.model||p.series}` : `<span style="color:var(--muted)">${s.label} — 선택 안 함</span>`}</div>
          ${p ? `<div class="final-spec">${getSpecs(s.cat, p)}</div>` : ''}
        </div>
        ${compatHtml}
      </div>`;
  }).join('');

  const tdp = totalTdp();
  const minW = Math.ceil(tdp * 1.3);
  const hasErr = Object.values(compatMap).some(r => r && !r.compatible);

  const gpuLen = sel.gpu?.length;
  const caseGuide = `
    <div class="case-guide">
      <div class="case-guide-title">🖥️ 케이스 선택 전 확인사항</div>
      <p style="font-size:.78rem;color:var(--text-secondary);margin:0 0 .7rem">케이스는 구성에서 제외되어 있습니다. 아래 항목을 확인한 뒤 케이스를 구매하세요.</p>

      <div class="case-check">
        <div class="case-check-icon">📐</div>
        <div class="case-check-body">
          <strong>그래픽카드 길이 확인</strong>
          ${gpuLen ? `<div>선택한 GPU 길이: <strong>${gpuLen}mm</strong> — 케이스 최대 GPU 장착 길이가 <strong>${gpuLen}mm 이상</strong>인 제품을 선택하세요.</div>` : '<div>GPU를 선택하지 않은 경우 GPU 제품 스펙의 카드 길이(mm)를 확인 후 케이스와 비교하세요.</div>'}
          <div class="hint">타워형 케이스는 보통 330~420mm, M-ATX 케이스는 280~320mm까지 지원합니다.</div>
        </div>
      </div>

      <div class="case-check">
        <div class="case-check-icon">🌬️</div>
        <div class="case-check-body">
          <strong>CPU 쿨러 높이 확인</strong>
          <div>공랭 타워 쿨러 사용 시 쿨러 높이(mm)와 케이스의 최대 CPU 쿨러 허용 높이를 반드시 비교하세요.</div>
          <div class="hint">일반 대형 타워 쿨러는 보통 155~170mm이며, 케이스 스펙에 표시된 허용 높이 이하여야 합니다.</div>
        </div>
      </div>

      <div class="case-check">
        <div class="case-check-icon">💧</div>
        <div class="case-check-body">
          <strong>수냉 쿨러(AIO) 라디에이터 장착 확인</strong>
          <div>수냉 쿨러 사용 예정이라면 케이스가 해당 라디에이터 규격을 지원하는지 확인하세요.</div>
          <div class="hint">
            • 팬 2개(240mm) 라디에이터: 케이스 전면 또는 상단에 240mm 지원 여부 확인<br>
            • 팬 3개(360mm) 라디에이터: 케이스 전면 또는 상단에 360mm 지원 여부 확인<br>
            • 일반 미들타워는 360mm를 지원하지 않는 경우가 많으니 풀타워 또는 전용 케이스를 권장합니다.
          </div>
        </div>
      </div>
    </div>`;

  document.getElementById('final-content').innerHTML = rows + `
    <div class="final-total">
      <span style="font-size:1.1rem">⚡</span>
      <div>
        <div style="font-weight:600;font-size:.88rem">예상 소비전력 ${tdp}W → 권장 파워 ${minW}W 이상</div>
        ${hasErr ? `<div style="font-size:.75rem;color:#dc2626;margin-top:.2rem">⚠ 호환되지 않는 부품이 있습니다. 다시 확인해 주세요.</div>` : `<div style="font-size:.75rem;color:#16a34a;margin-top:.2rem">✓ 모든 부품 호환 검사를 통과했습니다.</div>`}
      </div>
    </div>` + caseGuide;

  document.getElementById('final-section').hidden = false;
}

function resetBuilder() {
  Object.keys(sel).forEach(k => delete sel[k]);
  curStep = 0;
  document.getElementById('builder-body').hidden = false;
  document.getElementById('builder-steps').hidden = false;
  document.getElementById('final-section').hidden = true;
  render();
}

/* ── Part card click (event delegation) ── */
document.getElementById('parts-grid').addEventListener('click', e => {
  const card = e.target.closest('.part-card');
  if (!card || card.classList.contains('incompatible')) return;
  selectPart(card.dataset.key, card.dataset.id);
});

/* ── Live Prices ── */
let livePricesUpdated = null;

async function fetchLivePrices() {
  try {
    const res = await fetch('prices.json');
    if (!res.ok) return;
    const data = await res.json();
    if (!data.updated || !data.parts) return;
    let count = 0;
    for (const [cat, prices] of Object.entries(data.parts)) {
      const parts = window.SITE_DATA.parts[cat];
      if (!parts || !prices) continue;
      for (const p of parts) {
        const price = prices[p.id];
        if (price > 0) {
          p._livePrice = price;
          if (cat === 'motherboards') p.price = price;
          count++;
        }
      }
    }
    if (count > 0) {
      livePricesUpdated = new Date(data.updated).toLocaleDateString('ko-KR') + ' 기준';
      renderGrid();
      renderPanel();
    }
  } catch (_) {}
}

fetchLivePrices();

/* ── Init ── */
render();
</script>
</body>
</html>
