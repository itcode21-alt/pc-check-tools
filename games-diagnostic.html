<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게임 오류 진단 | PC 진단 센터</title>
    <meta name="description" content="발로란트, 롤, 로스트아크 등 인기 게임 오류 해결 방법 안내">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; line-height: 1.6; color: #333; background: #f5f5f5; }
        
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 40px 20px; text-align: center; }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        .game-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin: 30px 0; }
        
        .game-card { background: white; border-radius: 8px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); transition: transform 0.3s, box-shadow 0.3s; cursor: pointer; }
        
        .game-card:hover { transform: translateY(-5px); box-shadow: 0 8px 16px rgba(0,0,0,0.15); }
        
        .game-card h3 { color: #667eea; margin-bottom: 10px; font-size: 1.3em; }
        
        .game-card p { color: #666; font-size: 0.95em; margin-bottom: 15px; }
        
        .error-count { display: inline-block; background: #667eea; color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.85em; }
        
        .search-box { background: white; padding: 20px; border-radius: 8px; margin-bottom: 30px; }
        
        .search-box input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 1em; }
        
        .error-list { background: white; border-radius: 8px; padding: 20px; margin-top: 20px; }
        
        .error-item { padding: 15px; border-left: 4px solid #667eea; background: #f9f9f9; margin: 10px 0; border-radius: 4px; }
        
        .error-item h4 { color: #667eea; margin-bottom: 5px; }
        
        .error-item p { color: #666; font-size: 0.95em; }
        
        .btn { display: inline-block; background: #667eea; color: white; padding: 10px 20px; border-radius: 4px; text-decoration: none; margin-top: 10px; transition: background 0.3s; }
        
        .btn:hover { background: #764ba2; }
        
        footer { text-align: center; padding: 20px; color: #666; margin-top: 40px; border-top: 1px solid #ddd; }
    </style>
</head>
<body>
    <header class="header">
        <h1>🎮 게임 오류 진단 센터</h1>
        <p>발로란트, 롤, 로스트아크 등 인기 게임 오류 빠르게 해결하기</p>
    </header>

    <div class="container">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="게임명이나 오류명으로 검색... (예: 발로란트, Error 59, 프레임 드롭)">
        </div>

        <h2>🎯 인기 게임</h2>
        <div class="game-grid" id="gameGrid"></div>

        <h2>🔍 최근 오류 해결 사례</h2>
        <div class="error-list" id="errorList"></div>
    </div>

    <footer>
        <p>© 2024 PC 윈도우 진단 센터 | <a href="index.html">홈</a> | <a href="privacy.html">개인정보처리방침</a></p>
    </footer>

    <script src="games-data.js"></script>
    <script>
        // 게임 카드 렌더링
        const gameGrid = document.getElementById('gameGrid');
        gameBrands.forEach(game => {
            const errorCount = gameErrors.filter(e => e.game === game.name).length;
            const card = document.createElement('div');
            card.className = 'game-card';
            card.innerHTML = `
                <h3>${game.name}</h3>
                <p>${game.developer}</p>
                <span class="error-count">오류 ${errorCount}개</span>
                <a href="#" class="btn" onclick="filterByGame('${game.name}'); return false;">보기</a>
            `;
            gameGrid.appendChild(card);
        });

        // 검색 기능
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const errorList = document.getElementById('errorList');
            errorList.innerHTML = '';
            
            gameErrors.filter(error => 
                error.game.toLowerCase().includes(query) ||
                error.title.toLowerCase().includes(query) ||
                error.errorCode.toLowerCase().includes(query)
            ).forEach(error => {
                const item = document.createElement('div');
                item.className = 'error-item';
                item.innerHTML = `
                    <h4>【${error.game}】 ${error.title}</h4>
                    <p><strong>오류코드:</strong> ${error.errorCode}</p>
                    <p>${error.overview}</p>
                    <a href="#" class="btn" onclick="viewError('${error.id}'); return false;">자세히 보기</a>
                `;
                errorList.appendChild(item);
            });
        });

        // 게임별 필터
        function filterByGame(gameName) {
            const errorList = document.getElementById('errorList');
            errorList.innerHTML = '';
            
            gameErrors.filter(error => error.game === gameName).forEach(error => {
                const item = document.createElement('div');
                item.className = 'error-item';
                item.innerHTML = `
                    <h4>${error.title}</h4>
                    <p><strong>오류코드:</strong> ${error.errorCode}</p>
                    <p>${error.overview}</p>
                    <a href="#" class="btn" onclick="viewError('${error.id}'); return false;">해결 방법 보기</a>
                `;
                errorList.appendChild(item);
            });
            window.scrollTo({top: document.getElementById('errorList').offsetTop - 100, behavior: 'smooth'});
        }

        // 오류 상세 페이지 (또는 모달)
        function viewError(errorId) {
            const error = gameErrors.find(e => e.id === errorId);
            if (error) {
                // 모달 또는 별도 페이지로 이동
                alert(`${error.title}\n\n해결 방법:\n${error.solutions[0]}`);
            }
        }

        // 초기 로딩 시 모든 오류 표시
        function loadAllErrors() {
            const errorList = document.getElementById('errorList');
            gameErrors.slice(0, 10).forEach(error => {
                const item = document.createElement('div');
                item.className = 'error-item';
                item.innerHTML = `
                    <h4>【${error.game}】 ${error.title}</h4>
                    <p><strong>오류코드:</strong> ${error.errorCode}</p>
                    <p>${error.overview}</p>
                    <a href="#" class="btn" onclick="viewError('${error.id}'); return false;">자세히 보기</a>
                `;
                errorList.appendChild(item);
            });
        }

        loadAllErrors();
    </script>
</body>
</html>
